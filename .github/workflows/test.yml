name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check engine.js
          node --check sw.js
      - name: Run engine tests
        run: node --test tests/engine.test.mjs
