<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#071126" />
<title>Sand Sort</title>
<style>
:root{--bg:#071126;--bg2:#101c42;--panel:#111a3d;--panel2:#1b285d;--line:#7185dd;--text:#f7f8ff;--muted:#aeb9eb;--accent:#8d63ff;--ok:#43d5a5;--danger:#ff6780;--shadow:#0008}
:root[data-theme="light"]{--bg:#eaf1ff;--bg2:#bfd2ff;--panel:#f8faff;--panel2:#dfe8ff;--line:#6682c8;--text:#142044;--muted:#5c6a91;--accent:#7054e8;--ok:#22aa7e;--danger:#e74f69;--shadow:#48628c44}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,var(--bg2),var(--bg) 58%);color:var(--text);font-family:ui-rounded,-apple-system,BlinkMacSystemFont,"SF Pro Rounded",system-ui,sans-serif;overscroll-behavior:none}
button,input{font:inherit}button{touch-action:manipulation}
body{min-height:100svh;padding:env(safe-area-inset-top) 10px calc(10px + env(safe-area-inset-bottom));display:flex;justify-content:center}
.app{width:min(100%,680px);min-height:100svh;display:flex;flex-direction:column}
header{display:grid;grid-template-columns:48px 1fr 48px;align-items:center;padding:8px 0 2px}.title{text-align:center}.title h1{font-size:22px;margin:0}.title small{color:var(--muted);font-weight:700}.round{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:16px;height:44px;font-size:21px;box-shadow:inset 0 1px #fff3,0 5px 15px var(--shadow)}
.progress{display:flex;align-items:center;gap:8px;margin:6px 2px}.bar{height:7px;flex:1;background:#ffffff18;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--ok),#55bdf0);transition:.25s}.progress span{font-size:12px;color:var(--muted);font-weight:800}
.status{text-align:center;color:var(--muted);font-size:13px;min-height:18px;margin:0 0 4px}.board{position:relative;flex:1;display:flex;align-content:center;justify-content:center;align-items:center;gap:20px 12px;flex-wrap:wrap;padding:12px 2px 18px;min-height:350px}
.tube{position:relative;width:54px;height:154px;border:3px solid var(--line);border-top-width:2px;border-radius:11px 11px 22px 22px;background:linear-gradient(90deg,#fff1 0,#fff0 28%,#fff2 50%,#fff0 72%);box-shadow:inset 0 0 0 2px #11194a66,0 9px 18px var(--shadow);overflow:visible;transition:.16s transform,.16s filter,.16s opacity}.tube:before{content:"";position:absolute;z-index:8;left:-6px;right:-6px;top:-5px;height:10px;border:3px solid var(--line);border-radius:50%;background:var(--panel)}.tube.selected{transform:translateY(-13px) scale(1.04);filter:drop-shadow(0 8px 11px #8d63ff99)}.tube.valid{box-shadow:inset 0 0 0 2px #11194a66,0 0 0 3px var(--ok),0 9px 18px var(--shadow)}.tube.pouring-left{z-index:12;transform:translate(22px,-36px) rotate(58deg)}.tube.pouring-right{z-index:12;transform:translate(-22px,-36px) rotate(-58deg)}.tube.locked{pointer-events:none}.tube.done:after{content:"✓";position:absolute;z-index:9;top:48px;left:11px;width:27px;height:27px;display:grid;place-items:center;border-radius:50%;background:var(--ok);color:#fff;font-weight:900;border:2px solid #fff;animation:pop .35s}.inner{position:absolute;inset:2px 2px 3px;overflow:hidden;border-radius:6px 6px 17px 17px}.layer{position:absolute;left:0;right:0;height:24.9%;bottom:calc(var(--i)*24.9%);background:var(--c);border-top:1px solid #fff5;box-shadow:inset 9px 0 #fff1,inset -6px 0 #0002;transition:.22s bottom,.22s transform}.grain{position:fixed;z-index:30;width:6px;height:6px;border-radius:50%;background:var(--c);pointer-events:none;animation:grain .48s ease-in forwards}@keyframes grain{to{transform:translate(var(--dx),var(--dy)) scale(.25);opacity:.15}}@keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.15)}}
.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;background:color-mix(in srgb,var(--panel) 88%,transparent);border:1px solid #6174c266;border-radius:22px;padding:9px;box-shadow:0 12px 30px var(--shadow);backdrop-filter:blur(12px);position:sticky;bottom:calc(8px + env(safe-area-inset-bottom))}.ctl{min-height:50px;border:0;border-radius:14px;background:var(--panel2);color:var(--text);font-weight:750;font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}.ctl b{font-size:20px;line-height:20px}.ctl:disabled{opacity:.3}.primary{background:linear-gradient(135deg,#7558ef,#a852e8);color:#fff}
.overlay{position:fixed;inset:0;z-index:50;display:none;place-items:end center;background:#020411b5;backdrop-filter:blur(6px)}.overlay.open{display:grid}.sheet{width:min(100%,680px);max-height:92svh;overflow:auto;background:var(--panel);border:1px solid #6677c0;border-radius:26px 26px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px #0008}.sheet h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{border:1px solid #6372c5;background:var(--panel2);color:var(--text);border-radius:16px;padding:13px;text-align:left}.card strong{display:block;font-size:16px}.card span{color:var(--muted);font-size:12px}.row{display:grid;grid-template-columns:1fr auto;align-items:center;margin:13px 0}.row input{grid-column:1/3;width:100%;margin-top:8px}.start{width:100%;border:0;border-radius:16px;background:linear-gradient(135deg,var(--ok),#45b9e9);color:#071631;font-size:17px;font-weight:900;padding:15px;margin-top:10px}.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.levels{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.levelbtn{aspect-ratio:1;border:1px solid #6477c6;background:var(--panel2);color:var(--text);border-radius:13px;font-weight:900}.levelbtn.done{background:linear-gradient(135deg,#2cbc8f,#4ebfe9);color:#071631}.levelbtn.current{outline:3px solid var(--accent)}.editor{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:15px 0}.mini{width:47px;height:126px;border:2px solid var(--line);border-radius:9px 9px 18px 18px;overflow:hidden;display:flex;flex-direction:column-reverse;background:#fff1}.cell{height:25%;border-top:1px solid #fff4}.palette{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}.swatch{width:34px;height:34px;border-radius:50%;border:3px solid #fff8}.swatch.active{outline:3px solid var(--text)}.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);background:#000d;color:#fff;padding:10px 14px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap;z-index:70}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.win{text-align:center}.win .emoji{font-size:64px}.stats{display:flex;justify-content:center;gap:20px;color:var(--muted);margin:12px 0 18px}
@media(max-width:390px){.board{gap:15px 8px}.tube{width:49px;height:142px}.controls{gap:5px}.ctl{font-size:10px}.levels{grid-template-columns:repeat(5,1fr)}}
</style>
</head>
<body>
<div class="app">
<header><button class="round" id="menuBtn">☰</button><div class="title"><h1>Sand Sort</h1><small id="levelLabel">Level 1</small></div><button class="round" id="themeBtn">☀︎</button></header>
<div class="progress"><div class="bar"><i id="progressBar"></i></div><span id="progressText">0/60</span></div>
<div class="status" id="status">Sortiere jede Farbe in ein eigenes Glas.</div>
<main class="board" id="board"></main>
<nav class="controls"><button class="ctl" id="undoBtn"><b>↶</b>Zurück</button><button class="ctl" id="hintBtn"><b>✦</b>Tipp</button><button class="ctl" id="restartBtn"><b>↻</b>Neustart</button><button class="ctl" id="editorBtn"><b>✎</b>Editor</button><button class="ctl primary" id="nextBtn"><b>▶</b>Weiter</button></nav>
</div>
<div class="overlay" id="menu"><section class="sheet"><h2>Spiel wählen</h2><div class="grid"><button class="card" id="levelsBtn"><strong>60 Level</strong><span>Fortschritt speichern</span></button><button class="card" id="randomBtn"><strong>Zufallsspiel</strong><span>Eigene Schwierigkeit</span></button><button class="card" id="continueBtn"><strong>Fortsetzen</strong><span>Letzten Spielstand laden</span></button><button class="card" id="shareBtn"><strong>Teilen</strong><span>Level-Link kopieren</span></button></div><div class="actions"><button class="start secondary" id="closeMenu">Schließen</button><button class="start" id="resetProgress">Fortschritt löschen</button></div></section></div>
<div class="overlay" id="levels"><section class="sheet"><h2>Level auswählen</h2><div class="levels" id="levelGrid"></div><button class="start secondary" data-close>Schließen</button></section></div>
<div class="overlay" id="random"><section class="sheet"><h2>Zufallsspiel</h2><div class="row"><label>Farben</label><output id="colorsOut">6</output><input id="colorsRange" type="range" min="3" max="10" value="6"></div><div class="row"><label>Leere Gläser</label><output id="emptyOut">2</output><input id="emptyRange" type="range" min="1" max="3" value="2"></div><div class="row"><label>Durchmischung</label><output id="mixOut">Mittel</output><input id="mixRange" type="range" min="1" max="3" value="2"></div><button class="start" id="startRandom">Spiel starten</button><button class="start secondary" data-close>Abbrechen</button></section></div>
<div class="overlay" id="editor"><section class="sheet"><h2>Level-Editor</h2><p style="color:var(--muted)">Farbe wählen, dann Felder antippen. Leere Felder sind erlaubt.</p><div class="palette" id="palette"></div><div class="editor" id="editorBoard"></div><div class="actions"><button class="start secondary" id="addTube">Glas hinzufügen</button><button class="start secondary" id="removeTube">Glas entfernen</button></div><button class="start" id="playEditor">Level spielen</button><button class="start secondary" id="shareEditor">Link kopieren</button><button class="start secondary" data-close>Abbrechen</button></section></div>
<div class="overlay" id="victory"><section class="sheet win"><div class="emoji">🎉</div><h2>Geschafft!</h2><div class="stats"><span id="winMoves"></span><span id="winTime"></span></div><button class="start" id="victoryNext">Nächstes Level</button><button class="start secondary" id="victoryReplay">Nochmal</button></section></div>
<div class="toast" id="toast"></div>
<script>
const CAP=4,TOTAL_LEVELS=60;
const PALETTE=['#ff4c5f','#ff9637','#ffd238','#4fd17b','#34bce8','#5b6df5','#974fe8','#ed58b8','#8e5d3e','#50d6c5'];
const $=s=>document.querySelector(s),board=$('#board');
let tubes=[],initial=[],history=[],selected=null,moves=0,startTime=0,currentLevel=1,mode='campaign',busy=false,editorColor=0,editorTubes=[[0,1,2,3],[1,2,3,0],[],[]];
const clone=v=>v.map(x=>[...x]);
function rng(seed){let x=seed|0;return()=>{x=(x*1664525+1013904223)|0;return(x>>>0)/4294967296}}
function topRun(t){if(!t.length)return 0;let n=1;for(let i=t.length-2;i>=0&&t[i]===t.at(-1);i--)n++;return n}
function tubeDone(t){return t.length===CAP&&t.every(c=>c===t[0])}
function solved(){return tubes.every(t=>!t.length||tubeDone(t))}
function canPour(a,b){return a!==b&&tubes[a]?.length&&tubes[b]?.length<CAP&&(!tubes[b].length||tubes[b].at(-1)===tubes[a].at(-1))}
function generate(colors,empty,mix,seed){const r=rng(seed);let state=[];for(let c=0;c<colors;c++)state.push(Array(CAP).fill(c));for(let i=0;i<empty;i++)state.push([]);let last='';const steps=colors*(mix===1?8:mix===2?14:22);for(let k=0;k<steps;k++){let opts=[];for(let a=0;a<state.length;a++)for(let b=0;b<state.length;b++){if(a===b||!state[a].length||state[b].length===CAP)continue;const room=CAP-state[b].length,run=topRun(state[a]);if(room&&run)opts.push([a,b,Math.max(1,Math.min(run,room,1+Math.floor(r()*run)))])}let pool=opts.filter(x=>`${x[1]}-${x[0]}`!==last);if(!pool.length)pool=opts;if(!pool.length)break;const [a,b,n]=pool[Math.floor(r()*pool.length)];for(let i=0;i<n;i++)state[b].push(state[a].pop());last=`${a}-${b}`}for(let i=state.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[state[i],state[j]]=[state[j],state[i]]}return state}
function levelConfig(n){const colors=Math.min(10,3+Math.floor((n-1)/7));const mix=Math.min(3,1+Math.floor((n-1)/20));const empty=n<10?2:(n%9===0?1:2);return{colors,empty,mix,seed:9000+n*97}}
function save(){localStorage.setItem('sand-sort-save',JSON.stringify({tubes,initial,history,moves,startTime,currentLevel,mode,theme:document.documentElement.dataset.theme||'dark'}))}
function load(){try{const s=JSON.parse(localStorage.getItem('sand-sort-save'));if(!s)return false;Object.assign(window.__dummy||{},{});tubes=s.tubes;initial=s.initial;history=s.history||[];moves=s.moves||0;startTime=s.startTime||Date.now();currentLevel=s.currentLevel||1;mode=s.mode||'campaign';setTheme(s.theme||'dark');render();return true}catch{return false}}
function completed(){return new Set(JSON.parse(localStorage.getItem('sand-sort-completed')||'[]'))}
function markCompleted(){const s=completed();s.add(currentLevel);localStorage.setItem('sand-sort-completed',JSON.stringify([...s]))}
function setTheme(theme){document.documentElement.dataset.theme=theme;$('#themeBtn').textContent=theme==='light'?'☾':'☀︎';localStorage.setItem('sand-sort-theme',theme)}
function startCampaign(n){const c=levelConfig(n);currentLevel=n;mode='campaign';startGame(generate(c.colors,c.empty,c.mix,c.seed),`Level ${n}`)}
function startGame(state,label='Zufallsspiel'){tubes=clone(state);initial=clone(state);history=[];selected=null;moves=0;startTime=Date.now();busy=false;closeAll();$('#levelLabel').textContent=label;render();save()}
function render(){board.innerHTML='';tubes.forEach((t,i)=>{const el=document.createElement('button');el.className='tube'+(selected===i?' selected':'')+(selected!==null&&canPour(selected,i)?' valid':'')+(tubeDone(t)?' done':'')+(busy?' locked':'');el.dataset.i=i;const inner=document.createElement('div');inner.className='inner';t.forEach((c,j)=>{const l=document.createElement('span');l.className='layer';l.style.setProperty('--i',j);l.style.setProperty('--c',PALETTE[c]);inner.appendChild(l)});el.appendChild(inner);el.onclick=()=>tapTube(i);board.appendChild(el)});$('#undoBtn').disabled=!history.length||busy;$('#status').textContent=`${moves} Züge · ${tubes.filter(tubeDone).length}/${new Set(tubes.flat()).size||0} Farben fertig`;const done=completed().size;$('#progressBar').style.width=`${done/TOTAL_LEVELS*100}%`;$('#progressText').textContent=`${done}/${TOTAL_LEVELS}`;save()}
function haptic(type='tap'){if(navigator.vibrate)navigator.vibrate(type==='win'?[40,50,80]:type==='bad'?[30,40,30]:15)}
function toast(msg,type='tap'){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);haptic(type)}
async function animatePour(a,b,color){busy=true;render();const src=board.children[a],dst=board.children[b],sr=src.getBoundingClientRect(),dr=dst.getBoundingClientRect();src.classList.add(dr.left>sr.left?'pouring-left':'pouring-right');for(let i=0;i<14;i++){const g=document.createElement('i');g.className='grain';g.style.left=`${sr.left+sr.width/2}px`;g.style.top=`${sr.top+16}px`;g.style.setProperty('--c',PALETTE[color]);g.style.setProperty('--dx',`${dr.left-sr.left+(Math.random()*16-8)}px`);g.style.setProperty('--dy',`${dr.top-sr.top+90+Math.random()*20}px`);document.body.appendChild(g);setTimeout(()=>g.remove(),520);await new Promise(r=>setTimeout(r,18))}await new Promise(r=>setTimeout(r,180));busy=false}
async function doPour(a,b){if(!canPour(a,b))return false;history.push(clone(tubes));const n=Math.min(topRun(tubes[a]),CAP-tubes[b].length),color=tubes[a].at(-1);await animatePour(a,b,color);for(let i=0;i<n;i++)tubes[b].push(tubes[a].pop());moves++;selected=null;render();haptic();if(solved())setTimeout(showVictory,280);return true}
async function tapTube(i){if(busy)return;if(selected===null){if(tubes[i].length){selected=i;render();haptic()}}else if(selected===i){selected=null;render()}else if(!(await doPour(selected,i))){selected=tubes[i].length?i:null;render();toast('Hier passt die Farbe nicht.','bad')}}
function undo(){if(!history.length||busy)return;tubes=history.pop();moves=Math.max(0,moves-1);selected=null;render();haptic()}
function hint(){let best=null,bestScore=-1;for(let a=0;a<tubes.length;a++)for(let b=0;b<tubes.length;b++)if(canPour(a,b)){let s=(tubes[b].length?6:0)+topRun(tubes[a])+(tubes[b].length+topRun(tubes[a])===CAP?8:0);if(s>bestScore){best=[a,b];bestScore=s}}if(!best)return toast('Kein Zug gefunden. Nutze Zurück.','bad');selected=best[0];render();board.children[best[1]].animate([{transform:'scale(1)'},{transform:'scale(1.12)'},{transform:'scale(1)'}],{duration:650});toast(`Glas ${best[0]+1} → ${best[1]+1}`)}
function showVictory(){if(mode==='campaign')markCompleted();save();const sec=Math.floor((Date.now()-startTime)/1000);$('#winMoves').textContent=`${moves} Züge`;$('#winTime').textContent=`${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')} Min`;$('#victory').classList.add('open');haptic('win');render()}
function closeAll(){document.querySelectorAll('.overlay').forEach(x=>x.classList.remove('open'))}
function open(id){closeAll();$('#'+id).classList.add('open')}
function encodeLevel(state){return btoa(JSON.stringify(state)).replaceAll('+','-').replaceAll('/','_').replaceAll('=','')}
function decodeLevel(s){try{return JSON.parse(atob(s.replaceAll('-','+').replaceAll('_','/')))}catch{return null}}
async function share(state=tubes){const url=`${location.origin}${location.pathname}?level=${encodeLevel(state)}`;try{if(navigator.share)await navigator.share({title:'Sand Sort Level',url});else{await navigator.clipboard.writeText(url);toast('Link kopiert')}}catch{}}
function buildLevels(){const grid=$('#levelGrid');grid.innerHTML='';const done=completed();for(let n=1;n<=TOTAL_LEVELS;n++){const b=document.createElement('button');b.className='levelbtn'+(done.has(n)?' done':'')+(n===currentLevel?' current':'');b.textContent=n;b.onclick=()=>startCampaign(n);grid.appendChild(b)}}
function renderEditor(){const p=$('#palette');p.innerHTML='';PALETTE.forEach((c,i)=>{const b=document.createElement('button');b.className='swatch'+(i===editorColor?' active':'');b.style.background=c;b.onclick=()=>{editorColor=i;renderEditor()};p.appendChild(b)});const eb=$('#editorBoard');eb.innerHTML='';editorTubes.forEach((t,ti)=>{const tube=document.createElement('div');tube.className='mini';for(let ci=0;ci<CAP;ci++){const cell=document.createElement('button');cell.className='cell';cell.style.background=t[ci]===undefined?'transparent':PALETTE[t[ci]];cell.onclick=()=>{if(t[ci]===editorColor)t[ci]=undefined;else t[ci]=editorColor;editorTubes[ti]=t.filter(x=>x!==undefined);renderEditor()};tube.appendChild(cell)}eb.appendChild(tube)})}
$('#menuBtn').onclick=()=>open('menu');$('#closeMenu').onclick=closeAll;document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeAll);$('#levelsBtn').onclick=()=>{buildLevels();open('levels')};$('#randomBtn').onclick=()=>open('random');$('#continueBtn').onclick=()=>{if(!load())toast('Noch kein Spielstand')};$('#shareBtn').onclick=()=>share();$('#themeBtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='light'?'dark':'light');$('#undoBtn').onclick=undo;$('#hintBtn').onclick=hint;$('#restartBtn').onclick=()=>startGame(initial,$('#levelLabel').textContent);$('#nextBtn').onclick=()=>mode==='campaign'?startCampaign(Math.min(TOTAL_LEVELS,currentLevel+1)):open('random');$('#editorBtn').onclick=()=>{editorTubes=clone(tubes);renderEditor();open('editor')};$('#victoryNext').onclick=()=>mode==='campaign'?startCampaign(Math.min(TOTAL_LEVELS,currentLevel+1)):open('random');$('#victoryReplay').onclick=()=>startGame(initial,$('#levelLabel').textContent);$('#colorsRange').oninput=e=>$('#colorsOut').value=e.target.value;$('#emptyRange').oninput=e=>$('#emptyOut').value=e.target.value;$('#mixRange').oninput=e=>$('#mixOut').value=['','Locker','Mittel','Stark'][e.target.value];$('#startRandom').onclick=()=>{mode='random';const c=+$ ('#colorsRange').value,e=+$ ('#emptyRange').value,m=+$ ('#mixRange').value;startGame(generate(c,e,m,Date.now()),`Zufall · ${c} Farben`)};$('#addTube').onclick=()=>{if(editorTubes.length<13)editorTubes.push([]);renderEditor()};$('#removeTube').onclick=()=>{if(editorTubes.length>2)editorTubes.pop();renderEditor()};$('#playEditor').onclick=()=>{mode='editor';startGame(editorTubes,'Eigenes Level')};$('#shareEditor').onclick=()=>share(editorTubes);$('#resetProgress').onclick=()=>{localStorage.removeItem('sand-sort-completed');buildLevels();render();toast('Fortschritt gelöscht')};
setTheme(localStorage.getItem('sand-sort-theme')||'dark');const shared=new URLSearchParams(location.search).get('level'),decoded=shared&&decodeLevel(shared);if(decoded){mode='shared';startGame(decoded,'Geteiltes Level')}else if(!load())startCampaign(1);
</script>
</body>
</html>
